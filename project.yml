name: GFDTrainingPracticals
options:
  bundleIdPrefix: com.greensborofd
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "" # Set this to your Apple Developer Team ID in Xcode (Signing & Capabilities tab)
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1,2" # iPhone + iPad

targets:
  GFDTrainingPracticals:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      # XcodeGen auto-classifies files by type as it scans this folder recursively — Swift
      # files become Compile Sources, Assets.xcassets becomes a Resources entry, etc. Don't
      # add a separate top-level `resources:` list for things already under this path, or
      # Xcode will complain about duplicate outputs (e.g. two references to Assets.car).
      - path: GFDTrainingPracticals
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.greensborofd.trainingpracticals
        PRODUCT_NAME: "GFD Recruit Testing"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTS_MACCATALYST: false
    # XcodeGen generates the actual Info.plist and .entitlements files below from these
    # properties every time you run `xcodegen generate` — edit them here, not by hand in
    # Xcode, or your changes will be overwritten on the next generate.
    info:
      path: GFDTrainingPracticals/Resources/Info.plist
      properties:
        CFBundleDisplayName: "GFD Recruit Testing"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: "GFD Recruit Testing uses the camera to attach photo evidence to failed test steps."
        NSPhotoLibraryAddUsageDescription: "GFD Recruit Testing can save exported reports and photos to your photo library."
    entitlements:
      path: GFDTrainingPracticals/Resources/GFDTrainingPracticals.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.greensborofd.trainingpracticals
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.icloud-container-environment: Development
        aps-environment: development
    capabilities:
      com.apple.iCloud: {}
      com.apple.BackgroundModes: {}

schemes:
  GFDTrainingPracticals:
    build:
      targets:
        GFDTrainingPracticals: all
    run:
      config: Debug
    archive:
      config: Release
